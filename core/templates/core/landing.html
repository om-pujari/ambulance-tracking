{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidAid Dispatch</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="page-shell landing-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <main class="landing-hero">
        <div class="eyebrow">Emergency ambulance dispatch</div>

            <a class="primary-cta" href="{% url 'phone_page' %}">Book Ambulance</a>
            <a class="secondary-link" href="{% url 'driver_login' %}">Driver Login</a>
        </div>
    </main>
